version: "3"

vars:
  BINARY: fword
  CMD: ./cmd/fword
  # CI can set VERSION (e.g. tag name); otherwise use git describe.
  VERSION:
    sh: 'if [ -n "${VERSION:-}" ]; then printf "%s" "$VERSION"; else git describe --tags --always --dirty 2>/dev/null || echo "dev"; fi'
  LDFLAGS: '-ldflags "-X main.version={{.VERSION}} -s -w"'
  BUILD_FLAGS: "-trimpath {{.LDFLAGS}}"

tasks:
  default:
    cmds:
      - task: build

  # Default: build for current platform
  build:
    cmds:
      - go build -trimpath {{.LDFLAGS}} -o {{.BINARY}} {{.CMD}}
      - echo "✓  Built ./{{.BINARY}}  ({{.VERSION}})"

  # Install to $GOPATH/bin (or ~/go/bin)
  install:
    cmds:
      - go install -trimpath {{.LDFLAGS}} {{.CMD}}
      - echo "✓  Installed fword -> $(go env GOPATH)/bin/fword"

  # Quick dev run
  run:
    cmds:
      - go run {{.CMD}} {{.ARGS}}

  # Cross-compile for common platforms
  dist:
    cmds:
      - mkdir -p dist
      - GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build {{.BUILD_FLAGS}} -o dist/fword-linux-amd64 {{.CMD}}
      - GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build {{.BUILD_FLAGS}} -o dist/fword-linux-arm64 {{.CMD}}
      - GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build {{.BUILD_FLAGS}} -o dist/fword-darwin-amd64 {{.CMD}}
      - GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build {{.BUILD_FLAGS}} -o dist/fword-darwin-arm64 {{.CMD}}
      - GOOS=windows GOARCH=amd64 CGO_ENABLED=0 go build {{.BUILD_FLAGS}} -o dist/fword-windows-amd64.exe {{.CMD}}
      - echo "✓  Binaries in ./dist/"
      - ls -lh dist/

  # Linux + macOS only + sha256 (GitHub Releases / CI)
  release-dist:
    cmds:
      - mkdir -p dist
      - GOOS=linux GOARCH=amd64 CGO_ENABLED=0 go build {{.BUILD_FLAGS}} -o dist/fword-linux-amd64 {{.CMD}}
      - GOOS=linux GOARCH=arm64 CGO_ENABLED=0 go build {{.BUILD_FLAGS}} -o dist/fword-linux-arm64 {{.CMD}}
      - GOOS=darwin GOARCH=amd64 CGO_ENABLED=0 go build {{.BUILD_FLAGS}} -o dist/fword-darwin-amd64 {{.CMD}}
      - GOOS=darwin GOARCH=arm64 CGO_ENABLED=0 go build {{.BUILD_FLAGS}} -o dist/fword-darwin-arm64 {{.CMD}}
      - sha256sum dist/fword-linux-amd64 dist/fword-linux-arm64 dist/fword-darwin-amd64 dist/fword-darwin-arm64 > dist/SHA256SUMS
      - echo "✓  Release binaries in ./dist/"
      - ls -la dist/

  # Run tests
  test:
    cmds:
      - go test ./...

  # Tidy dependencies
  tidy:
    cmds:
      - go mod tidy

  # Print current config path
  config-path:
    cmds:
      - go run {{.CMD}} config show 2>/dev/null || true

  clean:
    cmds:
      - rm -f {{.BINARY}}
      - rm -rf dist/
