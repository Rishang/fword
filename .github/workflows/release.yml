# Tag-triggered release: cross-compile on one Linux runner (Go handles GOOS/GOARCH).
# Push a tag like v1.0 or v1.0.0 to create a GitHub Release with four binaries.

name: Release

on:
  push:
    tags:
      - "v*"

permissions:
  contents: write

jobs:
  release:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v6

      - uses: actions/setup-go@v6
        with:
          go-version-file: go.mod

      - uses: arduino/setup-task@v2
        with:
          version: 3.x

      - name: Build release binaries (Taskfile)
        env:
          VERSION: ${{ github.ref_name }}
        run: task release-dist

      - name: Publish release
        uses: softprops/action-gh-release@v2
        with:
          files: dist/*
          generate_release_notes: true
